apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smoke-web
  namespace: argocd
spec:
  destination:
    namespace: smoke-web
    server: https://kubernetes.default.svc
  sources:
    - repoURL: https://github.com/Mobility-Scooter-Project/mobility-scooter-infra.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/Mobility-Scooter-Project/mobility-scooter-infra.git
      targetRevision: main
      path: charts/api
      helm:
        valueFiles:
          - $values/samples/charts/smoke-web/values.yaml
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
